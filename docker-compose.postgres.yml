# =============================================================================
# ConstrutorPro - Docker Compose para PostgreSQL
# =============================================================================
# Para iniciar: docker-compose -f docker-compose.postgres.yml up -d
# Para parar: docker-compose -f docker-compose.postgres.yml down
# =============================================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: construtorpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: construtorpro
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d construtorpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: pgAdmin para gerenciar o banco
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: construtorpro-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@construtorpro.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
