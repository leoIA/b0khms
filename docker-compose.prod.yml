# =============================================================================
# ConstrutorPro - Docker Compose para Produção
# =============================================================================
# Uso: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Aplicação Principal
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: construtorpro-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_NAME=ConstrutorPro
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN}
      - NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY=${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY}
      - MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET}
      - MERCADOPAGO_SANDBOX=${MERCADOPAGO_SANDBOX:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - construtorpro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/test-simple"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Banco de Dados PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: construtorpro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-construtorpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-construtorpro123}
      POSTGRES_DB: ${POSTGRES_DB:-construtorpro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - construtorpro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-construtorpro} -d ${POSTGRES_DB:-construtorpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Proxy Reverso (Caddy)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: construtorpro-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - construtorpro-network
    depends_on:
      - app

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  construtorpro-network:
    driver: bridge
